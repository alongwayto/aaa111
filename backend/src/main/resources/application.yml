server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/campus_equipment?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.equipment.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:campus-equipment-management-system-secret-key-2024-very-long-string}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

ai:
  api:
    url: ${AI_API_URL:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
    key: ${AI_API_KEY:}
    model: ${AI_MODEL:doubao-pro}
    max-tokens: ${AI_MAX_TOKENS:2000}
    temperature: ${AI_TEMPERATURE:0.7}

doubao:
  api-key: ${DOUBAO_API_KEY:}
  base-url: ${DOUBAO_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
  model: ${DOUBAO_MODEL:doubao-pro}
  max-tokens: ${DOUBAO_MAX_TOKENS:2000}
  temperature: ${DOUBAO_TEMPERATURE:0.7}

file:
  upload-path: ./uploads/
  avatar-path: ./uploads/avatars/

backup:
  path: ${BACKUP_PATH:./backups/}
  mysql-dump-path: ${MYSQL_DUMP_PATH:mysqldump}
  mysql-path: ${MYSQL_PATH:mysql}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: Campus Equipment Management API
    description: SpringBoot + Vue API documentation
    version: 1.0.0

logging:
  level:
    com.campus.equipment: debug
    org.springframework.security: info
